<html><head><meta charset="utf-8"/><title>Test Report - EPAM Consistency Tests</title><style type="text/css">html,
body {

}
body {
  padding: 2rem 1rem;

}
.jesthtml-content {

    margin-right: 0;

  }
}

  display: flex;
  align-items: baseline;
}
#summary > div > div > * {
  margin-right: 0.5rem;
}
#summary > div > div:first-child {
  font-size: 1.5rem;

  margin-bottom: 0.25rem;
}
#summary .summary-stat {
  font-size: 1.5rem;

.suite-info {

  background: #f5f5f5;

}
.suite-info:hover {
  background: #e8e8e8;
}
.suite-path {
  font-size: 0.8rem;
  color: #777;
  margin-top: 0.2rem;
}
.suite-results {
  padding: 1rem;
}
.suite-results.hidden {
  display: none;
}
.test-result {
  padding: 0.5rem;
  margin-bottom: 0.25rem;
  border-radius: 4px;
}
.test-result.passed {
  background: #e8f5e9;
}
.test-result.failed {
  background: #ffebee;
}
.test-result .test-name {
  font-weight: 500;
}
.test-result .test-status {
  float: right;
  font-weight: bold;

.test-result.passed .test-status {
  color: #1d831d;
}
.test-result.failed .test-status {
  color: #ba1f1f;

<div class="jesthtml-content">
  <header>
    <h1 id="title">Test Report</h1>

  <div id="timestamp">Generat la: <span id="dynamicTime"></span></div>
  <div id="summary">
    <div>
      <div class="summary-stat success">10</div>
      <div class="summary-label">trecute</div>
    </div>
    <div>
      <div class="summary-stat">0</div>
      <div class="summary-label">eșuate</div>
    </div>

      <div class="summary-stat">10</div>
      <div class="summary-label">total</div>

document.getElementById('dynamicTime').textContent = new Date().toLocaleString('ro-RO');
